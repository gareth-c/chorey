name: Docker build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # needed so the push-back below works cleanly

      - name: Bump version
        if: github.event_name != 'pull_request'
        run: |
          python << 'EOF'
          import json
          from pathlib import Path
          from datetime import datetime
          vfile = Path("version.json")
          if vfile.exists():
              with open(vfile) as f:
                  v = json.load(f)
          else:
              v = {"year": 2026, "month": 1, "build": 0}
          now = datetime.now()
          # Reset build counter on month rollover, otherwise increment
          if v.get("year") == now.year and v.get("month") == now.month:
              v["build"] += 1
          else:
              v = {"year": now.year, "month": now.month, "build": 1}
          with open(vfile, "w") as f:
              json.dump(v, f, indent=2)
              f.write("\n")
          print(f"✓ Version updated: {v['year']}.{v['month']:02d} Build {v['build']}")
          EOF

      - name: Commit version bump
        if: github.event_name != 'pull_request'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add version.json
          git commit -m "Bump version [skip ci]" || echo "No changes to commit"
          git push

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Registry paths must be lowercase; github.repository preserves the repo's actual casing.
      - name: Compute lowercase image name
        id: image
        run: echo "name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short

      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          # Multi-arch manifests can only be assembled when pushing to a
          # registry — docker can't load more than one platform into the
          # local image store at once. PR validation builds (push: false)
          # stay single-platform (the runner's own amd64) for that reason.
          platforms: ${{ github.event_name != 'pull_request' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
